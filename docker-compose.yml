version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_BACKEND: mock
      CONSISTENCY_STRATEGY: cp
      DATABASE_URL: postgres://blockstore:blockstore@postgres:5432/blockstore?sslmode=disable
      PORT: "8080"
      ENV: development
      OTEL_EXPORTER: stdout
      OTEL_SERVICE_NAME: block-storage-api
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blockstore
      POSTGRES_PASSWORD: blockstore
      POSTGRES_DB: blockstore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockstore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
