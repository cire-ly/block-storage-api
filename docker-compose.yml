services:
  api:
    image: ghcr.io/cire-ly/block-storage-api:latest
    ports:
      - "8080:8080"
    environment:
      - STORAGE_BACKEND=ceph
      - DATABASE_URL=postgres://blockstore:blockstore@db:5432/blockstore?sslmode=disable
      - PORT=8080
      - ENV=production
      - OTEL_EXPORTER=stdout
      - OTEL_SERVICE_NAME=block-storage-api
      - CEPH_MONITORS=100.115.74.38:6789
      - CEPH_POOL=rbd-demo
      - CEPH_KEYRING=/etc/ceph/ceph.client.admin.keyring
    volumes:
      - /etc/ceph:/etc/ceph:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        loki-external-labels: "service=block-storage-api"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=blockstore
      - POSTGRES_PASSWORD=blockstore
      - POSTGRES_DB=blockstore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockstore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=scaleway2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata:
  lokidata:
  grafanadata:
